[advisories]
version = 2
# Fails CI if any dependency has a published advisory.
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause"
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"   # flag, don't fail, when two versions of a crate are in the tree
wildcards = "deny"           # never allow `crate = "*"` anywhere

# ARCHITECTURE RULES start
#
# DOMAIN LAYER
# mrmr-domain is the domain layer of the application. All workspace
# crates may depend on it, and it should be pure business logic.
[[bans.deny]]
name = "mrmr-core"
wrappers = [
    "mrmr-app",                                                 # Blue tier    - ApplicationCore
                                                                # Red tier      - InfrastructureAdapters
    "mrmr-cli",                                                 # Yellow tier   - Adapter Binaries
]

# APPLICATION LAYER
# mrmr-app may not be a direct dep of Green tier (only Green is "mrmr-domain")
# Every other tier, including siblings, may legitimately depend on it.
[[bans.deny]]
name = "mrmr-app"
wrappers = [
                                                                # Red tier      - InfrastructureAdapters
    "mrmr-cli",                                                 # Yellow tier   - Adapter Binaries
]

