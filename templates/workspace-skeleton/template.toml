name = "Rust workspace skeleton (MurMur-style)"
description = "Tree-architected Cargo workspace with prek + CI + dual license"
kickstart_version = 1
authors = ["Your Name <you@example.com>"]
keywords = ["rust", "workspace", "tree-architecture"]

# Files we don't want copied into the generated project.
ignore = [
    "init_git.sh",
    "TEMPLATE.md",
]

# Files copied verbatim — Tera will not try to render them.
# GitHub Actions uses `${{ ... }}` which collides with Tera's `{{ ... }}`.
copy_without_render = [".github/workflows/*.yml"]

# Run after questions are answered, before generation. Good for
# extra validation. (Hooks are templated executable scripts; we
# can leave this empty for v1.)
pre_gen_hooks = []

# Run after generation. Useful for `git init`, etc.
# post_gen_hooks = [
#     { name = "init git", path = "init_git.sh" },
# ]


cleanup = [
    { name = "include_prek", value = false, paths = ["prek.toml"]},
    { name = "include_cargo_deny", value = false, paths = ["deny.toml"]},
]

[[variables]]
name       = "project_short_name"
default    = "my-project"
prompt     = "What is the binary name of this project? (kebab-case)"
validation = "^[a-z][a-z0-9-]+$"

[[variables]]
name       = "project_canonical_name"
default    = "My Project"
prompt     = "What is the canonical name of this project?"
validation = "^[A-Za-z][A-Za-z0-9- ]+$"

[[variables]]
name    = "project_slug"
default = "{{ project_short_name | kebab_case }}"
derived = true

[[variables]]
name    = "binary_prefix"
default = "{{ project_short_name | replace(from='-', to='') | truncate(length=4, end='') }}"
prompt  = "Binary prefix (short, lowercase)"

[[variables]]
name    = "crate_prefix"
default = "{{ project_slug | replace(from='-', to='_') }}"
derived = true

[[variables]]
name   = "authors_line"
default = "Christopher Lee Murray <lee.christopher.murray@gmail.com>"
prompt = "Authors line (Name <email>)"

[[variables]]
name   = "authors_git_username"
default = "leechristophermurray"
prompt = "Authors git username"

[[variables]]
name    = "edition"
default = "2024"
prompt  = "Rust edition"
choices = ["2024", "2021"]

[[variables]]
name    = "rust_version"
default = "1.95.0"
prompt  = "Pinned Rust toolchain version"

[[variables]]
name    = "license"
default = "Apache-2.0 OR MIT"
prompt  = "License"
choices = ["Apache-2.0 OR MIT", "MIT", "Apache-2.0", "AGPL-3.0-or-later"]

[[variables]]
name    = "include_prek"
default = true
prompt  = "Include prek pre-commit configuration?"

[[variables]]
name    = "include_cargo_deny"
default = true
prompt  = "Include cargo-deny configuration?"

[[variables]]
name   = "description"
default = "MurMur is an open, standards-grade coordination platform for small fleets of edge-resident robots."
prompt = "Short description of the project"
