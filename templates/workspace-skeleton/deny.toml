[advisories]
version = 2
# Fails CI if any dependency has a published advisory.
yanked = "deny"

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause"
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"   # flag, don't fail, when two versions of a crate are in the tree
wildcards = "deny"           # never allow `crate = "*"` anywhere

# ARCHITECTURE RULES start
#
# DOMAIN LAYER
# {{ project_slug }}-domain is the domain layer of the application. All workspace
# crates may depend on it, and it should be pure business logic.
[[bans.deny]]
name = "{{ project_slug }}-core"
wrappers = [
    "{{ project_slug }}-app",                                                 # Blue tier    - ApplicationCore
                                                                # Red tier      - InfrastructureAdapters
    "{{ project_slug }}-cli",                                                 # Yellow tier   - Adapter Binaries
]

# APPLICATION LAYER
# {{ project_slug }}-app may not be a direct dep of Green tier (only Green is "{{ project_slug }}-domain")
# Every other tier, including siblings, may legitimately depend on it.
[[bans.deny]]
name = "{{ project_slug }}-app"
wrappers = [
                                                                # Red tier      - InfrastructureAdapters
    "{{ project_slug }}-cli",                                                 # Yellow tier   - Adapter Binaries
]

